on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.2 or 1.0.2-nightly.15)"
        required: true
        type: string

env:
  CN_APPLICATION: "fastrepl/hyprnote2"

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      channel: ${{ steps.parse.outputs.channel }}
    steps:
      - id: parse
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" == *"-nightly"* ]]; then
            CHANNEL="nightly"
          else
            CHANNEL="stable"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

  cn-publish:
    needs: parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/version.sh "./apps/desktop/src-tauri/tauri.conf.json" "${{ needs.parse.outputs.version }}"
      - id: existing-release
        continue-on-error: true
        uses: ./.github/actions/cn_release
        with:
          raw: >-
            release show ${{ env.CN_APPLICATION }} ${{ needs.parse.outputs.version }}
            --channel ${{ needs.parse.outputs.channel }}
          key: ${{ secrets.CN_API_KEY }}
      - id: publish-decision
        env:
          ASSETS: ${{ steps.existing-release.outputs.raw }}
        run: |
          if [[ "${{ steps.existing-release.outcome }}" != "success" ]]; then
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXPECTED_PLATFORMS=(
            "dmg-aarch64"
            "dmg-x86_64"
          )

          MISSING_PLATFORMS=()
          for platform in "${EXPECTED_PLATFORMS[@]}"; do
            if ! echo "$ASSETS" | jq -e --arg platform "$platform" '.assets[] | select(.publicPlatform == $platform)' > /dev/null; then
              MISSING_PLATFORMS+=("$platform")
            fi
          done

          if [[ "${#MISSING_PLATFORMS[@]}" -gt 0 ]]; then
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
            echo "missing_platforms=${MISSING_PLATFORMS[*]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish_needed=false" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/cn_release
        if: ${{ steps.publish-decision.outputs.publish_needed == 'true' }}
        with:
          cmd: publish
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ needs.parse.outputs.channel }}
          framework: tauri
          working-directory: ./apps/desktop

  gh-release:
    needs: [parse, cn-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force
      - id: download-macos-aarch64
        uses: ./.github/actions/cn_download
        with:
          app: ${{ env.CN_APPLICATION }}
          version: ${{ needs.parse.outputs.version }}
          channel: ${{ needs.parse.outputs.channel }}
          platform: dmg-aarch64
          output: char-macos-aarch64.dmg
          key: ${{ secrets.CN_API_KEY }}
      - id: download-macos-x86_64
        uses: ./.github/actions/cn_download
        with:
          app: ${{ env.CN_APPLICATION }}
          version: ${{ needs.parse.outputs.version }}
          channel: ${{ needs.parse.outputs.channel }}
          platform: dmg-x86_64
          output: char-macos-x86_64.dmg
          key: ${{ secrets.CN_API_KEY }}
      - id: checksums
        uses: ./.github/actions/generate_checksums
        with:
          files: |
            char-macos-aarch64.dmg
            char-macos-x86_64.dmg
      - id: release-body
        env:
          CHANNEL: ${{ needs.parse.outputs.channel }}
          VERSION: ${{ needs.parse.outputs.version }}
        run: |
          if [[ "$CHANNEL" != "nightly" ]]; then
            echo "value=https://anarlog.so/changelog/$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="desktop_v$VERSION"
          PREV_TAG=""
          LAST_TAG=""
          LAST_NIGHTLY_TAG=""

          while IFS= read -r tag; do
            if [[ "$tag" == "$CURRENT_TAG" ]]; then
              PREV_TAG="$LAST_NIGHTLY_TAG"
              if [[ -z "$PREV_TAG" ]]; then
                PREV_TAG="$LAST_TAG"
              fi
              break
            fi

            if [[ "$tag" == *"-nightly."* ]]; then
              LAST_NIGHTLY_TAG="$tag"
            fi

            LAST_TAG="$tag"
          done < <(git tag -l 'desktop_v*' --sort=v:refname)

          if [[ -n "$PREV_TAG" ]]; then
            echo "value=https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://github.com/${{ github.repository }}/commits/${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: ncipollo/release-action@v1
        with:
          tag: desktop_v${{ needs.parse.outputs.version }}
          name: desktop_v${{ needs.parse.outputs.version }}
          body: ${{ steps.release-body.outputs.value }}
          prerelease: ${{ needs.parse.outputs.channel == 'nightly' }}
          artifacts: char-macos-aarch64.dmg,char-macos-x86_64.dmg,${{ steps.checksums.outputs.checksum_files }}
          allowUpdates: true
          makeLatest: ${{ needs.parse.outputs.channel == 'nightly' && 'false' || 'true' }}
          replacesArtifacts: true
